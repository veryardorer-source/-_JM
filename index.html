<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인테리어 견적 프로그램</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: linear-gradient(160deg, #1a3a6e 0%, #2563c0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .container {
      max-width: 640px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: -0.5px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 32px; }
    .grid { display: grid; gap: 14px; }
    .card {
      display: block;
      padding: 20px 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .card:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .card h2 { font-size: 18px; margin-bottom: 4px; font-weight: 700; }
    .card p { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-top: 8px;
    }
    footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏗 인테리어 견적 도구</h1>
    <p class="subtitle">프로젝트 선택</p>

    <div class="grid">
      <a class="card" href="./P_1/">
        <h2>📋 P_1 · 인테리어 견적 프로그램</h2>
        <p>실 단위 견적 작성, 견적서(PDF·Excel), 도면 AI 분석, 공종별 내역서, 프로젝트 저장/불러오기</p>
        <span class="badge">견적서 · PDF · AI</span>
      </a>

      <a class="card" href="./P_2/">
        <h2>📐 P_2 · 물량산출 프로그램</h2>
        <p>공간별 면 단위 자재 물량 자동 계산, 인테리어필름 구간 산출, Excel 내보내기</p>
        <span class="badge">물량 · 필름 · Excel</span>
      </a>
    </div>

    <footer>
      veryardorer-source/JM · updated 2026-04-23
    </footer>
  </div>
</body>
</html>
