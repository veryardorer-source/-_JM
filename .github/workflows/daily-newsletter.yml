# 매일 아침 07:00 KST에 인테리어·마케팅 트렌드 뉴스레터를 발송합니다.
#
# 필요한 GitHub Secrets (Settings > Secrets and variables > Actions):
#   ANTHROPIC_API_KEY      - Claude API 키
#   SMTP_HOST              - 예: smtp.gmail.com
#   SMTP_PORT              - 465 (SSL) 또는 587 (STARTTLS). 기본값 465
#   SMTP_USER              - 발송용 Gmail 주소
#   SMTP_PASSWORD          - Gmail 앱 비밀번호 (일반 비밀번호 아님)
#   NEWSLETTER_SENDER      - 선택. 기본값은 SMTP_USER
#   NEWSLETTER_RECIPIENTS  - 쉼표로 구분한 수신자 이메일 목록
#
# 주의: GitHub Actions의 schedule은 기본 브랜치(main)에 있는 워크플로우만 실행됩니다.
#       배포 전에는 workflow_dispatch로 수동 테스트 후 main에 머지하세요.

name: Daily Trend Newsletter

on:
  schedule:
    # 07:00 KST = 22:00 UTC (전날)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: newsletter/requirements.txt

      - name: Install dependencies
        run: pip install -r newsletter/requirements.txt

      - name: Send daily newsletter
        working-directory: newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NEWSLETTER_SENDER: ${{ secrets.NEWSLETTER_SENDER }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
        run: python main.py
